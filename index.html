  .bg-stage::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;

    opacity: 0.55;

  /* Ruido overlay muy sutil */
  .noise-overlay {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    opacity: 0.035; mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.9'/></svg>");

    background: linear-gradient(95deg, #B57DFF 0%, #F239FF 70%, #FFB0FF 100%);

    background-clip: text;
    color: transparent;
    background-size: 200% 100%;
    animation: gradientPan 9s ease-in-out infinite;
  }
  .text-brand-solid {
    background: linear-gradient(95deg, #8943E3, #F239FF);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

    position: relative;

    background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015));

    padding: 2px;
    background: linear-gradient(135deg, #8943E3, #F239FF 70%, #6A32B3);

    background: radial-gradient(ellipse at center, rgba(242,57,255,0.35), transparent 60%);
    filter: blur(40px);
    z-index: -1;
  }
  /* Vignette + subtle brand tint — unifies photos regardless of original background */
  .photo-ring > img { filter: brightness(0.95) contrast(1.04) saturate(0.96); }
  .photo-ring::after {
    content: "";
    position: absolute;
    inset: 2px;
    border-radius: inherit;
    background:
      radial-gradient(ellipse at center, transparent 35%, rgba(8,6,12,0.55) 100%),
      linear-gradient(135deg, rgba(137,67,227,0.08), rgba(242,57,255,0.10));
    mix-blend-mode: multiply;
    pointer-events: none;
  }

  .check-svg path { stroke-dasharray: 48; stroke-dashoffset: 48; animation: drawCheck 0.55s ease-out 0.25s both; }

  /* Scroll indicator */
  .scroll-indicator { animation: float 2.4s ease-in-out infinite; }

  /* Spin utility */
  @keyframes gradientPan { 0%,100% { background-position: 0% 50% } 50% { background-position: 100% 50% } }

  /* Honor reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
  }

  /* Hide arrows in number inputs */
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }

  /* Focus rings */
  .field:focus-within { border-color: rgba(242,57,255,0.6); box-shadow: 0 0 0 3px rgba(242,57,255,0.15); }

  /* Marquee duplicate trick */
  .marquee-track { animation: marquee 26s linear infinite; }

  /* Traveling light border — uses @property for animated conic angle */
  @property --travel-angle {
    syntax: '<angle>';
    inherits: false;
    initial-value: 0deg;
  }
  @keyframes travelAngle { to { --travel-angle: 360deg; } }

  .travel-light { position: relative; padding: 0 2px; }
  .travel-light::before {
    content: "";
    position: absolute;
    inset: -6px -10px;
    border-radius: 14px;
    padding: 1.5px;
    background: conic-gradient(from var(--travel-angle, 0deg),
      transparent 0turn, transparent 0.68turn,
      rgba(242,57,255,0) 0.72turn,
      rgba(242,57,255,0.85) 0.82turn,
      rgba(255,198,255,1) 0.88turn,
      rgba(242,57,255,0.85) 0.94turn,
      transparent 1turn);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    animation: travelAngle 4.2s linear infinite;
    pointer-events: none;
    filter: blur(0.4px);
  }

  .card-travel::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1.5px;
    background: conic-gradient(from var(--travel-angle, 0deg),
      transparent 0turn, transparent 0.74turn,
      rgba(242,57,255,0) 0.78turn,
      rgba(242,57,255,0.65) 0.86turn,
      rgba(255,210,255,0.95) 0.9turn,
      rgba(242,57,255,0.65) 0.94turn,
      transparent 1turn);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    animation: travelAngle 7s linear infinite;
    animation-delay: var(--travel-delay, 0s);
    pointer-events: none;
    opacity: 0.75;
    z-index: 2;
  }

  @media (prefers-reduced-motion: reduce) {
    .travel-light::before, .card-travel::before { animation: none; opacity: 0.25; }
  }
</style>

                         border: '1px solid rgba(255,255,255,0.08)',
                         boxShadow: '0 30px 80px -20px rgba(137,67,227,0.45), inset 0 1px 0 rgba(255,255,255,0.08)',
                       }}>
                    {/* Window header */}
                    <div className="flex items-center justify-between pb-3.5 border-b border-white/5">
                      <div className="flex items-center gap-1.5">
                        <span className="w-2.5 h-2.5 rounded-full bg-[#ff5f56]"></span>
                        <span className="w-2.5 h-2.5 rounded-full bg-[#ffbd2e]"></span>
                        <span className="w-2.5 h-2.5 rounded-full bg-[#27c93f]"></span>
                      </div>
                      <div className="flex items-center gap-2 text-[11px] font-mono text-white/45">
                        <IconFolder className="w-3.5 h-3.5" />
                        Kit de Inicio
                      </div>
                      <div className="w-[42px]"></div>
                    </div>

                    {/* iOS-style icon grid */}
                    <div className="mt-5 grid grid-cols-2 gap-3 sm:gap-4">
                      {items.map((item, i) => (
                        <div key={item.label}
                             className="relative group flex flex-col items-center gap-2.5 p-4 rounded-2xl bg-white/[0.025] border border-white/5 hover:bg-white/[0.05] hover:border-nexum-pink/25 transition-all duration-500"
                             style={{animation: `fadeUp .8s ${(0.2 + i*0.12).toFixed(2)}s cubic-bezier(.2,.7,.2,1) both`}}>
                          <div className="relative">
                            <div className="absolute inset-0 blur-xl opacity-60 brand-gradient rounded-[18px]"></div>
                            <div className="relative w-[64px] h-[64px] rounded-[18px] brand-gradient flex items-center justify-center"
                                 style={{boxShadow: 'inset 0 1px 0 rgba(255,255,255,0.3), 0 10px 24px -6px rgba(242,57,255,0.55)'}}>
                              <item.Icon className="w-7 h-7 text-white" strokeWidth={1.8} />
                            </div>
                          </div>
                          <div className="text-[11.5px] font-semibold text-white/90 tracking-wide">{item.label}</div>
                        </div>
                      ))}
                    </div>

                    {/* Page dots (iOS vibe) */}
                    <div className="mt-5 flex items-center justify-center gap-1.5">
                      <span className="w-1.5 h-1.5 rounded-full bg-white/70"></span>
                      <span className="w-1.5 h-1.5 rounded-full bg-white/25"></span>
                      <span className="w-1.5 h-1.5 rounded-full bg-white/25"></span>
                    </div>
                  </div>

                  {/* Floating "197€" price tag */}
                  <div className="absolute -top-3 -right-3 md:-top-4 md:-right-4 rounded-full px-3.5 py-2 brand-gradient text-white text-[11px] uppercase tracking-[0.18em] font-bold"
                       style={{boxShadow: '0 12px 30px -8px rgba(242,57,255,0.65)', transform: 'rotate(6deg)'}}>
                    197€ incluido
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    };

    /* ---------- Closing CTA ---------- */
    const ClosingCTA = ({ onOpenModal }) => (
      <section className="relative py-20 md:py-28 px-4 sm:px-6">
        <div className="max-w-[760px] mx-auto">
          <div className="reveal relative gradient-border-strong rounded-[2rem] p-8 md:p-14 overflow-hidden text-center">
            <div className="absolute -top-24 -right-16 w-[320px] h-[320px] rounded-full bg-nexum-pink/15 blur-3xl pointer-events-none"></div>
            <div className="absolute -bottom-24 -left-16 w-[320px] h-[320px] rounded-full bg-nexum-purple/15 blur-3xl pointer-events-none"></div>
            <div className="relative">
              <h2 className="font-display font-bold text-[clamp(1.8rem,4.5vw,2.8rem)] leading-[1.1] tracking-[-0.02em]">
                ¿Listo para construir <span className="text-brand-gradient">tu agencia de IA</span>?
              </h2>
              <p className="mt-4 text-white/65 max-w-xl mx-auto leading-relaxed">
                Reserva tu lugar en la masterclass del 7 de mayo y accede al Kit de Inicio.
              </p>
              <button type="button" onClick={onOpenModal}
                      className="mt-8 cta-primary rounded-full px-8 py-4 font-semibold text-white text-sm sm:text-base tracking-wide inline-flex items-center gap-2">
                RESERVAR MI LUGAR <IconArrow className="w-4 h-4" />
              </button>
            </div>
          </div>
        </div>
      </section>
    );

    /* ---------- Modal ---------- */
    const Modal = ({ open, onClose, onSubmit, submitting }) => {
      const [name, setName] = useState('');
      const [email, setEmail] = useState('');
      const [errors, setErrors] = useState({});

      useEffect(() => {
        if (!open) return;
        const onEsc = (ev) => { if (ev.key === 'Escape') onClose(); };
        document.addEventListener('keydown', onEsc);
        const prev = document.body.style.overflow;
        document.body.style.overflow = 'hidden';
        return () => {
          document.removeEventListener('keydown', onEsc);
          document.body.style.overflow = prev;
        };
      }, [open, onClose]);

      if (!open) return null;

      const validate = () => {
        const e = {};
        if (!name.trim()) e.name = 'Ingresa tu nombre';
        if (!email.trim()) e.email = 'Ingresa tu email';
        else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) e.email = 'Email inválido';
        return e;
      };

      const handleSubmit = (ev) => {
        ev.preventDefault();
        const e = validate();
        setErrors(e);
        if (Object.keys(e).length === 0) onSubmit({ name, email });
      };

      return (
        <div className="fixed inset-0 z-[90] flex items-center justify-center p-4 bg-black/70 backdrop-blur-md animate-fade-up"
             onClick={onClose} role="dialog" aria-modal="true">
          <div onClick={(e) => e.stopPropagation()}
               className="relative w-full max-w-[480px] gradient-border-strong rounded-3xl p-7 md:p-9 bg-[#0E0A14] animate-scale-in">
            <button type="button" onClick={onClose} aria-label="Cerrar"
                    className="absolute top-4 right-4 w-8 h-8 rounded-full flex items-center justify-center text-white/60 hover:text-white hover:bg-white/10 transition">
              <IconX className="w-4 h-4" />
            </button>
            <h3 className="font-display font-bold text-2xl md:text-[1.75rem] leading-tight tracking-[-0.01em]">
              Reserva tu plaza
            </h3>
            <p className="mt-2 text-white/55 text-[14px]">Para la masterclass del 7 de mayo.</p>

            <div className="mt-5 gradient-border rounded-xl p-4 text-left text-[13.5px] text-white/80 leading-relaxed">
              <span className="text-nexum-pink">🎁</span> Al registrarte accedes a tu <span className="text-white font-medium">Kit de Inicio para Agencias de IA</span> <span className="text-white/55">(valorado en 197€)</span>
            </div>

            <form onSubmit={handleSubmit} noValidate className="mt-5 space-y-4">
              <div>
                <div className={`field flex items-center rounded-xl border bg-black/30 ${errors.name ? 'border-rose-400/60' : 'border-white/10'} transition`}>
                  <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Tu nombre"
                         className="w-full bg-transparent px-4 py-3.5 outline-none text-white placeholder:text-white/30" />
                </div>
                {errors.name && <p className="mt-1.5 text-xs text-rose-300">{errors.name}</p>}
              </div>
              <div>
                <div className={`field flex items-center rounded-xl border bg-black/30 ${errors.email ? 'border-rose-400/60' : 'border-white/10'} transition`}>
                  <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="Tu mejor email"
                         className="w-full bg-transparent px-4 py-3.5 outline-none text-white placeholder:text-white/30" />
                </div>
                {errors.email && <p className="mt-1.5 text-xs text-rose-300">{errors.email}</p>}
              </div>
              <button type="submit" disabled={submitting}
                      className="cta-primary w-full rounded-full py-4 font-semibold text-white text-sm sm:text-base tracking-wide inline-flex items-center justify-center gap-2 disabled:opacity-80 disabled:cursor-wait">
                {submitting ? (
                  <>
                    <span className="inline-block w-4 h-4 border-2 border-white/70 border-t-transparent rounded-full animate-spin-slow"></span>
                    PROCESANDO…
                  </>
                ) : (
                  <>RESERVAR MI LUGAR <IconArrow className="w-4 h-4" /></>
                )}
              </button>
              <div className="flex items-center justify-center gap-2 text-xs text-white/45 pt-1">
                <IconLock className="w-3.5 h-3.5" /> Tus datos están seguros.
              </div>
            </form>
          </div>
        </div>
      );
    };

    /* ---------- Footer ---------- */
    const Footer = () => (
      <footer className="relative border-t border-white/5 mt-8 py-10 px-4 sm:px-6">
        <div className="max-w-[1180px] mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
          <Logo className="h-6 opacity-80" />
          <div className="text-xs text-white/40 text-center">© 2026 Nexum AI. Todos los derechos reservados.</div>
          <div className="flex items-center gap-5 text-xs text-white/50">
            <a href="#" className="hover:text-white transition">Aviso Legal</a>
            <a href="#" className="hover:text-white transition">Política de Privacidad</a>
          </div>
        </div>
      </footer>
    );

    /* ---------- Confirm overlay (transition) ---------- */
    const ConfirmOverlay = () => (
      <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/70 backdrop-blur-md animate-fade-up">
        <div className="animate-scale-in text-center px-6">
          <div className="relative mx-auto w-24 h-24 rounded-full brand-gradient flex items-center justify-center shadow-glow-pink">
            <svg viewBox="0 0 52 52" className="check-svg w-14 h-14 text-white">
              <path d="M14 27 l8 8 l16 -18" fill="none" stroke="currentColor" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
            <span className="absolute inset-0 rounded-full ring-2 ring-nexum-pink/50 animate-pulse-ring pointer-events-none"></span>
          </div>
          <h3 className="mt-8 font-display font-bold text-2xl md:text-3xl">¡Listo! Tu lugar está reservado 🎉</h3>
          <p className="mt-3 text-white/60">Te llevamos a los próximos pasos…</p>
        </div>
      </div>
    );

    /* ---------- Marquee ---------- */
    const Marquee = () => {
      const item = "⚠️  SOLO TE QUEDA UN PASO PARA CONFIRMAR TU PLAZA";
      const items = Array(8).fill(item);
      return (
        <div className="relative overflow-hidden brand-gradient border-y border-white/10">
          <div className="marquee-track flex whitespace-nowrap py-3 font-display font-bold tracking-[0.1em] text-sm md:text-base text-white">
            {items.concat(items).map((t, i) => (
              <span key={i} className="flex items-center gap-8 px-6">{t}<span className="text-white/70">✦</span></span>
            ))}
          </div>
        </div>
      );
    };

    /* ---------- PostRegistration view ---------- */
    const CALENDAR_URL = 'https://calendar.google.com/calendar/render?action=TEMPLATE&text=Masterclass+Nexum+AI&dates=20260507T170000Z/20260507T183000Z&details=Masterclass+en+vivo+con+Agust%C3%ADn+Badt+y+Juan+Pablo+Rosso+de+Nexum+AI&location=Online';

    const PostRegistration = () => {
      useEffect(() => {
        // Mobile-safe hard reset to top: window.scrollTo solo no alcanza en iOS
        requestAnimationFrame(() => {
          window.scrollTo(0, 0);
          document.documentElement.scrollTop = 0;
          if (document.body) document.body.scrollTop = 0;
        });
      }, []);
      return (
      <div className="animate-fade-up">
        <Marquee />
        <section className="relative pt-16 md:pt-24 pb-12 px-4 sm:px-6">
          <div className="max-w-[760px] mx-auto text-center">
            <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full gradient-border text-[11px] tracking-[0.2em] uppercase font-semibold">
              <span className="text-emerald-300">✓</span>
              <span className="text-white/85">Plaza confirmada</span>
            </div>
            <h1 className="mt-6 font-display font-black text-[clamp(2.2rem,6vw,4.2rem)] leading-[1.02] tracking-[-0.02em]">
              ¡Ya estás dentro! <span className="inline-block animate-float">🎉</span>
            </h1>
            <p className="mt-5 text-white/75 text-lg max-w-xl mx-auto leading-relaxed">
              Tu lugar en la masterclass del 7 de mayo está reservado.
            </p>

            <a href={CALENDAR_URL} target="_blank" rel="noopener noreferrer"
               className="mt-8 inline-flex items-center gap-2 rounded-full px-6 py-3 font-semibold text-white text-sm tracking-wide gradient-border-strong hover:bg-white/5 transition">
              <IconCalendar className="w-4 h-4" /> Añadir al calendario
            </a>

            <p className="mt-6 text-white/65 text-[15px] max-w-lg mx-auto leading-relaxed">
              📩 Revisa tu bandeja de entrada — te enviamos un email con todos los detalles de la masterclass.
            </p>
          </div>
        </section>

        <div className="max-w-[760px] mx-auto px-4 sm:px-6">
          <div className="h-px bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
        </div>

        <section className="relative pt-12 md:pt-16 pb-16 px-4 sm:px-6">
          <div className="max-w-[760px] mx-auto text-center">
            <h2 className="font-display font-bold text-[clamp(1.6rem,4vw,2.4rem)] leading-[1.1] tracking-[-0.02em]">
              <span className="text-brand-gradient">Únete a nuestra comunidad</span><br/>para no perderte nada
            </h2>
            <p className="mt-5 text-white/70 text-[16px] max-w-xl mx-auto leading-relaxed">
              En nuestra comunidad de Skool vas a encontrar tu Kit de Inicio, material previo a la masterclass y el acceso directo al evento en vivo.
            </p>

            <a href="https://www.skool.com/nexum" target="_blank" rel="noopener noreferrer"
               className="mt-8 cta-primary rounded-full px-8 py-4 font-semibold text-white text-sm sm:text-base tracking-wide flex sm:inline-flex items-center justify-center gap-2 w-full max-w-xs sm:max-w-none sm:w-auto mx-auto">
              UNIRME A LA COMUNIDAD <IconExternal className="w-4 h-4" />
            </a>

            <div className="mt-12 grid md:grid-cols-3 gap-4">
              {[
                { Icon: IconGift,    t: 'Tu Kit', d: 'Tu Kit de Inicio para Agencias de IA listo para descargar' },
                { Icon: IconCalendar,t: 'Recordatorio', d: 'Recordatorio y link de acceso a la masterclass en vivo' },
                { Icon: IconUsers,   t: 'Comunidad', d: 'Comunidad de personas construyendo agencias de IA' },
              ].map((c, i) => (
                <div key={i} className="reveal gradient-border rounded-2xl p-5 text-left">
                  <div className="w-10 h-10 rounded-lg brand-gradient flex items-center justify-center">
                    <c.Icon className="w-5 h-5 text-white" strokeWidth={2} />
                  </div>
                  <div className="mt-3 text-[11px] uppercase tracking-[0.2em] text-nexum-pink/80 font-semibold">{c.t}</div>
                  <div className="mt-1 text-[15px] text-white/85 leading-snug">{c.d}</div>
                </div>
              ))}
            </div>
          </div>
        </section>
      </div>
      );
    };

    /* ---------- Registration view ---------- */
    const Registration = ({ countdown, onOpenModal }) => (
      <>
        <Nav countdown={countdown} onOpenModal={onOpenModal} />
        <Hero countdown={countdown} onOpenModal={onOpenModal} />
        <PainBlock />
        <LearnCards />
        <ForYou />
        <About />
        <Bonus onOpenModal={onOpenModal} />
        <ClosingCTA onOpenModal={onOpenModal} />
      </>
    );

    /* ---------- Main App ---------- */
    function App() {
      const [view, setView] = useState('registration');
      const [submitting, setSubmitting] = useState(false);
      const [overlay, setOverlay] = useState(false);
      const [modalOpen, setModalOpen] = useState(false);
      const [countdown, setCountdown] = useState(computeCountdown(TARGET));

      useEffect(() => {
        const id = setInterval(() => setCountdown(computeCountdown(TARGET)), 1000);
        return () => clearInterval(id);
      }, []);

      useReveal();

      const openModal = useCallback(() => setModalOpen(true), []);
      const closeModal = useCallback(() => setModalOpen(false), []);

      const handleSubmit = useCallback((data) => {
        setSubmitting(true);
        setTimeout(() => {
          setSubmitting(false);
          setModalOpen(false);
          setOverlay(true);
          setTimeout(() => {
            // 1) Scroll a top ANTES de cambiar la view (el overlay todavía tapa → sin flash)
            window.scrollTo(0, 0);
            document.documentElement.scrollTop = 0;
            if (document.body) document.body.scrollTop = 0;
            // 2) Cambiar la view + quitar overlay
            setView('postRegistration');
            setOverlay(false);
          }, 2500);
        }, 900);
      }, []);

      // Lock body scroll durante el overlay (evita scroll accidental en mobile)
      useEffect(() => {
        if (overlay) {
          const prev = document.body.style.overflow;
          document.body.style.overflow = 'hidden';
          return () => { document.body.style.overflow = prev; };
        }
      }, [overlay]);

      return (
        <>
          {view === 'registration'
            ? <Registration countdown={countdown} onOpenModal={openModal} />
            : <PostRegistration />}
          <Footer />
          <Modal open={modalOpen} onClose={closeModal} onSubmit={handleSubmit} submitting={submitting} />
          {overlay && <ConfirmOverlay />}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
