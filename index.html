<style>
  :root {
    --nexum-purple: #8943E3;
    --nexum-pink:   #F239FF;
    --nexum-deep:   #6A32B3;
    --nexum-ink:    #0A0A0A;
  }
  html { scroll-behavior: smooth; overflow-x: hidden; }
  body {
    background: #0A0A0A;
    color: #fff;
    font-family: 'Helvetica Neue', Helvetica, Arial, system-ui, sans-serif;
    font-feature-settings: 'kern' 1, 'liga' 1;
    letter-spacing: -0.005em;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
    position: relative;
    width: 100%;
    max-width: 100vw;
  }
  #root { overflow-x: hidden; max-width: 100vw; }

  /* No-select azul en form inputs: sacar outline nativo y tap-highlight de iOS */
  input, textarea, select, button, a {
    -webkit-tap-highlight-color: transparent;
  }
  input, textarea, select {
    -webkit-appearance: none;
       -moz-appearance: none;
            appearance: none;
    border-radius: 0;
  }
  input:focus, textarea:focus, select:focus,
  input:focus-visible, textarea:focus-visible, select:focus-visible {
    outline: none !important;
    box-shadow: none !important;
    -webkit-box-shadow: none !important;
  }
  input::-moz-focus-inner { border: 0; }
  /* Safari iOS: matar el "focus ring" azul propio del user agent */
  input:focus { caret-color: #F239FF; }
  /* Fondo global: dotted grid + gradiente radial sutil + ruido */
  .bg-stage::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      radial-gradient(ellipse 70% 60% at 20% 0%, rgba(137,67,227,0.14), transparent 60%),
      radial-gradient(ellipse 60% 50% at 90% 20%, rgba(242,57,255,0.09), transparent 55%),
      radial-gradient(ellipse 80% 60% at 50% 100%, rgba(106,50,179,0.12), transparent 60%);
  }
  .bg-stage::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 22px 22px;
    mask-image: radial-gradient(ellipse 100% 80% at 50% 50%, black 30%, transparent 85%);
    -webkit-mask-image: radial-gradient(ellipse 100% 80% at 50% 50%, black 30%, transparent 85%);
    opacity: 0.55;
  }
  /* Ruido overlay muy sutil */
  .noise-overlay {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    opacity: 0.035; mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.9'/></svg>");
  }

  /* Gradiente de marca reutilizable */
  .brand-gradient { background: linear-gradient(95deg, #8943E3 0%, #F239FF 100%); }
  .brand-gradient-soft { background: linear-gradient(95deg, rgba(137,67,227,0.18), rgba(242,57,255,0.18)); }
  .text-brand-gradient {
    background: linear-gradient(95deg, #B57DFF 0%, #F239FF 70%, #FFB0FF 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    background-size: 200% 100%;
    animation: gradientPan 9s ease-in-out infinite;
  }
  .text-brand-solid {
    background: linear-gradient(95deg, #8943E3, #F239FF);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  /* Borde con gradiente (pseudo trick) */
  .gradient-border {
    position: relative;
    background: linear-gradient(#0D0B10, #0D0B10) padding-box,
                linear-gradient(135deg, rgba(137,67,227,0.55), rgba(242,57,255,0.55)) border-box;
    border: 1px solid transparent;
  }
  .gradient-border-strong {
    background: linear-gradient(#0E0A14, #0E0A14) padding-box,
                linear-gradient(135deg, #8943E3, #F239FF) border-box;
    border: 1.5px solid transparent;
  }

  /* Glass card */
  .glass {
    background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015));
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  /* CTA principal */
  .cta-primary {
    position: relative;
    background: linear-gradient(95deg, #8943E3 0%, #F239FF 100%);
    background-size: 200% 100%;
    transition: transform .35s cubic-bezier(.2,.8,.2,1), box-shadow .35s, background-position .6s;
    box-shadow: 0 10px 30px -10px rgba(242,57,255,0.45), 0 0 0 1px rgba(255,255,255,0.08) inset;
  }
  .cta-primary:hover {
    transform: translateY(-2px) scale(1.02);
    background-position: 100% 50%;
    box-shadow: 0 20px 50px -12px rgba(242,57,255,0.6), 0 0 0 1px rgba(255,255,255,0.12) inset;
  }
  .cta-primary::after {
    content: "";
    position: absolute; inset: 0;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(135deg, rgba(255,255,255,0.7), transparent 50%);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    pointer-events: none;
    opacity: 0.6;
  }
  /* Traveling light for CTA buttons */
  .cta-primary::before,
  .cta-whatsapp::before {
    content: "";
    position: absolute; inset: 0;
    border-radius: inherit;
    padding: 1.5px;
    background: conic-gradient(from var(--travel-angle, 0deg),
      transparent 0turn, transparent 0.74turn,
      rgba(255,255,255,0) 0.78turn,
      rgba(255,255,255,0.85) 0.86turn,
      rgba(255,255,255,1) 0.9turn,
      rgba(255,255,255,0.85) 0.94turn,
      transparent 1turn);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    animation: travelAngle 5.5s linear infinite;
    animation-delay: var(--travel-delay, 0s);
    pointer-events: none;
    opacity: 0.95;
    z-index: 3;
  }

  /* Scrollbar fino */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: #0A0A0A; }
  ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #8943E3, #F239FF); border-radius: 10px; }

  /* Reveal on scroll */
  .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.9s cubic-bezier(.2,.7,.2,1), transform 0.9s cubic-bezier(.2,.7,.2,1); }
  .reveal.is-visible { opacity: 1; transform: translateY(0); }

  /* Photo treatment */
  .photo-ring {
    position: relative;
    padding: 2px;
    background: linear-gradient(135deg, #8943E3, #F239FF 70%, #6A32B3);
  }
  .photo-glow::before {
    content: ""; position: absolute; inset: -30%;
    background: radial-gradient(ellipse at center, rgba(242,57,255,0.35), transparent 60%);
    filter: blur(40px);
    z-index: -1;
  }
  /* Vignette + subtle brand tint — unifies photos regardless of original background */
  .photo-ring > img { filter: brightness(0.95) contrast(1.04) saturate(0.96); }
  .photo-ring::after {
    content: "";
    position: absolute;
    inset: 2px;
    border-radius: inherit;
    background:
      radial-gradient(ellipse at center, transparent 35%, rgba(8,6,12,0.55) 100%),
      linear-gradient(135deg, rgba(137,67,227,0.08), rgba(242,57,255,0.10));
    mix-blend-mode: multiply;
    pointer-events: none;
  }

  /* Checkmark animado */
  .check-svg path { stroke-dasharray: 48; stroke-dashoffset: 48; animation: drawCheck 0.55s ease-out 0.25s both; }

  /* Scroll indicator */
  .scroll-indicator { animation: float 2.4s ease-in-out infinite; }

  /* Spin utility */
  @keyframes gradientPan { 0%,100% { background-position: 0% 50% } 50% { background-position: 100% 50% } }

  /* Honor reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
    .cta-primary::before, .cta-whatsapp::before { opacity: 0 !important; }
  }

  /* Hide arrows in number inputs */
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }

  /* Focus rings */
  .field:focus-within { border-color: rgba(242,57,255,0.6); box-shadow: 0 0 0 3px rgba(242,57,255,0.15); }

  /* Marquee duplicate trick — lento, infinito */
  @keyframes marquee {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .marquee-track {
    animation: marquee 30s linear infinite;
    will-change: transform;
  }
  /* Respetamos reduced-motion a nivel global pero mantenemos el marquee legible */
  @media (prefers-reduced-motion: reduce) {
    .marquee-track { animation: marquee 90s linear infinite !important; }
  }

  /* Traveling light border — uses @property for animated conic angle */
  @property --travel-angle {
    syntax: '<angle>';
    inherits: false;
    initial-value: 0deg;
  }
  @keyframes travelAngle { to { --travel-angle: 360deg; } }

  .card-travel::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1.5px;
    background: conic-gradient(from var(--travel-angle, 0deg),
      transparent 0turn, transparent 0.74turn,
      rgba(242,57,255,0) 0.78turn,
      rgba(242,57,255,0.65) 0.86turn,
      rgba(255,210,255,0.95) 0.9turn,
      rgba(242,57,255,0.65) 0.94turn,
      transparent 1turn);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    animation: travelAngle 7s linear infinite;
    animation-delay: var(--travel-delay, 0s);
    pointer-events: none;
    opacity: 0.75;
    z-index: 2;
  }

  @media (prefers-reduced-motion: reduce) {
    .card-travel::before { animation: none; opacity: 0.25; }
  }

  /* Slow pulsing violet glow behind nav countdown */
  @keyframes navGlow {
    0%, 100% { opacity: 0.18; transform: translate(-50%, -50%) scale(0.92); }
    50%      { opacity: 0.55; transform: translate(-50%, -50%) scale(1.05); }
  }
  .nav-glow {
    background: radial-gradient(ellipse at center, rgba(137,67,227,0.55) 0%, rgba(137,67,227,0.22) 45%, transparent 72%);
    filter: blur(18px);
    animation: navGlow 8s ease-in-out infinite;
    will-change: opacity, transform;
  }
  @media (prefers-reduced-motion: reduce) {
    .nav-glow { animation: none; opacity: 0.3; }
  }

  /* Spotlight card — mouse-tracking glow + tilt */
  .spotlight-card {
    position: relative;
    isolation: isolate;
    --mx: 50%;
    --my: 50%;
    --nx: 0;
    --ny: 0;
    --on: 0;
    --accent: 52, 211, 153;
    --accent-bright: 110, 231, 183;
    transition: transform 0.55s cubic-bezier(.2,.7,.2,1), box-shadow 0.55s;
    will-change: transform;
  }
  .spotlight-card--no {
    --accent: 244, 63, 94;
    --accent-bright: 251, 113, 133;
  }
  .spotlight-card:hover {
    transform:
      perspective(1200px)
      rotateY(calc(var(--nx) * 5deg))
      rotateX(calc(var(--ny) * -4deg))
      translateZ(0);
    box-shadow: 0 28px 80px -24px rgba(var(--accent), 0.28);
  }
  .spotlight-card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background:
      radial-gradient(circle 360px at var(--mx) var(--my),
        rgba(var(--accent-bright), 0.22),
        rgba(var(--accent), 0.08) 32%,
        transparent 62%);
    opacity: var(--on);
    transition: opacity 0.5s cubic-bezier(.2,.7,.2,1);
    pointer-events: none;
    z-index: 0;
  }
  .spotlight-card::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1.5px;
    background:
      radial-gradient(circle 280px at var(--mx) var(--my),
        rgba(var(--accent-bright), 0.95),
        rgba(var(--accent), 0.35) 35%,
        transparent 60%);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    opacity: var(--on);
    transition: opacity 0.5s cubic-bezier(.2,.7,.2,1);
    pointer-events: none;
    z-index: 2;
  }
  .spotlight-card > * { position: relative; z-index: 1; }
  @media (prefers-reduced-motion: reduce) {
    .spotlight-card { transform: none !important; }
    .spotlight-card::before, .spotlight-card::after { opacity: 0 !important; }
  }

  /* Interactive grid that warps under cursor */
  .grid-warp { --mx: 50%; --my: 50%; --nx: 0; --ny: 0; --mg: 0; }
  .grid-warp .grid-base,
  .grid-warp .grid-hot {
    background-image:
      linear-gradient(rgba(137,67,227,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(137,67,227,0.07) 1px, transparent 1px);
    background-size: 32px 32px;
    will-change: transform, opacity;
  }
  .grid-warp .grid-base {
    -webkit-mask-image: radial-gradient(ellipse 85% 75% at 50% 50%, black 35%, transparent 92%);
            mask-image: radial-gradient(ellipse 85% 75% at 50% 50%, black 35%, transparent 92%);
    transform:
      scale(calc(1 + var(--mg) * 0.04))
      translate3d(
        calc(var(--nx) * var(--mg) * -22px),
        calc(var(--ny) * var(--mg) * -22px),
        0);
    transition: transform 1s cubic-bezier(.2,.7,.2,1);
  }
  .grid-warp .grid-hot {
    background-image:
      linear-gradient(rgba(242,57,255,0.42) 1px, transparent 1px),
      linear-gradient(90deg, rgba(242,57,255,0.42) 1px, transparent 1px);
    -webkit-mask-image: radial-gradient(circle 220px at var(--mx) var(--my), black 0%, rgba(0,0,0,0.55) 25%, transparent 70%);
            mask-image: radial-gradient(circle 220px at var(--mx) var(--my), black 0%, rgba(0,0,0,0.55) 25%, transparent 70%);
    opacity: var(--mg);
    transition: opacity 0.55s cubic-bezier(.2,.7,.2,1);
  }
  @media (prefers-reduced-motion: reduce) {
    .grid-warp .grid-base { transition: none; transform: none; }
    .grid-warp .grid-hot { display: none; }
  }

  /* Slow pulsing glow for ClosingCTA card */
  @keyframes closingPulse {
    0%, 100% { opacity: 0.35; transform: scale(0.94); }
    50%      { opacity: 0.95; transform: scale(1.06); }
  }
  .closing-pulse::after {
    content: "";
    position: absolute;
    inset: -10%;
    background:
      radial-gradient(ellipse at center, rgba(137,67,227,0.28) 0%, rgba(242,57,255,0.14) 38%, transparent 70%);
    filter: blur(18px);
    animation: closingPulse 9s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }
  @media (prefers-reduced-motion: reduce) {
    .closing-pulse::after { animation: none; opacity: 0.5; transform: none; }
  }

  /* Modal pulse — more translucent */
  @keyframes modalPulse {
    0%, 100% { opacity: 0.3; transform: scale(0.94); }
    50%      { opacity: 0.8; transform: scale(1.08); }
  }
  .modal-pulse::after {
    content: "";
    position: absolute;
    inset: -15%;
    background: radial-gradient(ellipse at center, rgba(137,67,227,0.26) 0%, rgba(242,57,255,0.13) 40%, transparent 72%);
    filter: blur(24px);
    animation: modalPulse 11s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }
  .modal-pulse > * { position: relative; z-index: 1; }
  @media (prefers-reduced-motion: reduce) {
    .modal-pulse::after { animation: none; opacity: 0.4; transform: none; }
  }

  /* Reminder card — dotted grid fondo + glow al hover */
  .reminder-card {
    position: relative;
    overflow: hidden;
    transition: transform .5s cubic-bezier(.2,.7,.2,1), box-shadow .5s, border-color .5s;
  }
  .reminder-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.09) 1px, transparent 1px);
    background-size: 16px 16px;
    mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, black 35%, transparent 90%);
    -webkit-mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, black 35%, transparent 90%);
    opacity: 0.55;
    pointer-events: none;
    z-index: 0;
  }
  .reminder-card::after {
    content: "";
    position: absolute;
    inset: -25%;
    background: radial-gradient(ellipse 60% 70% at 20% 0%, rgba(137,67,227,0.22), transparent 60%);
    filter: blur(32px);
    pointer-events: none;
    z-index: 0;
    opacity: 0.55;
    transition: opacity .55s;
  }
  .reminder-card > * { position: relative; z-index: 1; }
  .reminder-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 24px 60px -24px rgba(137,67,227,0.55);
  }
  .reminder-card:hover::after { opacity: 1; }
  .reminder-card--pink::after {
    background: radial-gradient(ellipse 60% 70% at 80% 0%, rgba(242,57,255,0.22), transparent 60%);
  }
  .reminder-card--pink:hover {
    box-shadow: 0 24px 60px -24px rgba(242,57,255,0.55);
  }
  @media (prefers-reduced-motion: reduce) {
    .reminder-card:hover { transform: none; }

          canvas.height = Math.floor(h * DPR);
          ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

          const count = 5;
          blobs = Array.from({length: count}, () => {
            const sx = Math.random() < 0.5 ? -1 : 1;
            const sy = Math.random() < 0.5 ? -1 : 1;
            return {
              x: Math.random() * w,
              y: Math.random() * h,
              baseR: 55 + Math.random() * 80,
              vx: sx * (0.35 + Math.random() * 0.4),
              vy: sy * (0.22 + Math.random() * 0.3),
              baseAlpha: 0.04 + Math.random() * 0.06,
              phase: Math.random() * Math.PI * 2,
              freq: 0.0008 + Math.random() * 0.0012,
              color: Math.random() < 0.45 ? '242,57,255' : '137,67,227',
            };
          });
        };

          ctx.clearRect(0, 0, w, h);
          ctx.globalCompositeOperation = 'lighter';

          for (const b of blobs) {
            b.x += b.vx;
            b.y += b.vy;
            if (b.x < -b.baseR) b.x = w + b.baseR;
            else if (b.x > w + b.baseR) b.x = -b.baseR;
            if (b.y < -b.baseR) b.y = h + b.baseR;
            else if (b.y > h + b.baseR) b.y = -b.baseR;

            const breath = Math.sin(t * b.freq + b.phase);
            const alpha = b.baseAlpha * (0.75 + 0.25 * breath);
            const r = b.baseR * (0.94 + 0.06 * Math.sin(t * b.freq * 1.3 + b.phase));

            const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, r);
            grad.addColorStop(0, 'rgba(' + b.color + ',' + alpha + ')');
            grad.addColorStop(0.45, 'rgba(' + b.color + ',' + (alpha * 0.35) + ')');
            grad.addColorStop(1, 'rgba(' + b.color + ',0)');
            ctx.fillStyle = grad;
            ctx.fillRect(b.x - r, b.y - r, r * 2, r * 2);
          }

          raf = visible && !reduced ? requestAnimationFrame(draw) : null;
        };

        resize(); init();
        if (reduced) draw(0);
        else raf = requestAnimationFrame(draw);

        const io = new IntersectionObserver(([e]) => {
          visible = e.isIntersecting;
          if (visible && !reduced && !raf) raf = requestAnimationFrame(draw);
          else if (!visible && raf) { cancelAnimationFrame(raf); raf = null; }
        }, { rootMargin: '100px' });
        io.observe(canvas);

        let rt;
        const onResize = () => { clearTimeout(rt); rt = setTimeout(() => { resize(); init(); }, 120); };
        window.addEventListener('resize', onResize);

        return () => {
          if (raf) cancelAnimationFrame(raf);
          io.disconnect();
          window.removeEventListener('resize', onResize);
          clearTimeout(rt);
        };
      }, []);
      return <canvas ref={ref} className="absolute inset-0 w-full h-full pointer-events-none" aria-hidden="true"></canvas>;

      return (

             onClick={onClose} role="dialog" aria-modal="true">

            <button type="button" onClick={onClose} aria-label="Cerrar"
                    className="absolute top-4 right-4 w-8 h-8 rounded-full flex items-center justify-center text-white/60 hover:text-white hover:bg-white/10 transition">
              <IconX className="w-4 h-4" />

            <h3 className="font-display font-bold text-2xl md:text-[1.75rem] leading-tight tracking-[-0.01em]">
              Reserva tu plaza

            <p className="mt-2 text-white/55 text-[14px]">Para la masterclass del 7 de mayo.</p>

            <div className="mt-5 gradient-border rounded-xl p-4 text-left text-[13.5px] text-white/80 leading-relaxed">
              <span className="text-nexum-pink">🎁</span> Al registrarte accedes a tu <span className="text-white font-medium">Kit de Inicio para Agencias de IA</span> <span className="text-white/55">(valorado en 790€)</span>

            <form onSubmit={handleSubmit} noValidate className="mt-5 space-y-4">

                <div className={`field flex items-center rounded-xl border bg-black/30 ${errors.name ? 'border-rose-400/60' : 'border-white/10'} transition`}>
                  <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Tu nombre"

                </div>
                {errors.name && <p className="mt-1.5 text-xs text-rose-300">{errors.name}</p>}
              </div>
              <div>
                <div className={`field flex items-center rounded-xl border bg-black/30 ${errors.email ? 'border-rose-400/60' : 'border-white/10'} transition`}>
                  <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="Tu mejor email"
                         className="w-full bg-transparent px-4 py-3.5 outline-none text-white placeholder:text-white/30" />
                </div>
                {errors.email && <p className="mt-1.5 text-xs text-rose-300">{errors.email}</p>}
              </div>
              <button type="submit" disabled={submitting}
                      className="cta-primary w-full rounded-full py-4 font-semibold text-white text-sm sm:text-base tracking-wide inline-flex items-center justify-center gap-2 disabled:opacity-80 disabled:cursor-wait">
                {submitting ? (
                  <>
                    <span className="inline-block w-4 h-4 border-2 border-white/70 border-t-transparent rounded-full animate-spin-slow"></span>
                    PROCESANDO…
                  </>
                ) : (
                  <>RESERVAR MI LUGAR <IconArrow className="w-4 h-4" /></>
                )}
              </button>
              <div className="flex items-center justify-center gap-2 text-xs text-white/45 pt-1">
                <IconLock className="w-3.5 h-3.5" /> Tus datos están seguros.
              </div>
            </form>
          </div>
        </div>
      );
    };

    /* ---------- Footer ---------- */
    const Footer = () => (
      <footer className="relative border-t border-white/5 mt-8 py-10 px-4 sm:px-6">
        <div className="max-w-[1180px] mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
          <Logo className="h-6 opacity-80" />
          <div className="text-xs text-white/40 text-center">© 2026 Nexum AI. Todos los derechos reservados.</div>
          <div className="flex items-center gap-5 text-xs text-white/50">
            <a href="#" className="hover:text-white transition">Aviso Legal</a>
            <a href="#" className="hover:text-white transition">Política de Privacidad</a>
          </div>
        </div>
      </footer>
    );

    /* ---------- Confirm overlay (transition) ---------- */
    const ConfirmOverlay = () => (
      <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/70 backdrop-blur-md animate-fade-up">
        <div className="animate-scale-in text-center px-6">
          <div className="relative mx-auto w-24 h-24 rounded-full brand-gradient flex items-center justify-center shadow-glow-pink">
            <svg viewBox="0 0 52 52" className="check-svg w-14 h-14 text-white">
              <path d="M14 27 l8 8 l16 -18" fill="none" stroke="currentColor" strokeWidth="5" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
            <span className="absolute inset-0 rounded-full ring-2 ring-nexum-pink/50 animate-pulse-ring pointer-events-none"></span>
          </div>
          <h3 className="mt-8 font-display font-bold text-2xl md:text-3xl">¡Listo! Tu lugar está reservado 🎉</h3>
          <p className="mt-3 text-white/60">Te llevamos a los próximos pasos…</p>
        </div>
      </div>
    );

    /* ---------- Marquee ---------- */
    const Marquee = () => {
      const item = "⚠️  SOLO TE QUEDA UN PASO PARA CONFIRMAR TU PLAZA";
      const items = Array(8).fill(item);
      return (
        <div className="relative overflow-hidden brand-gradient border-y border-white/10">
          <div className="marquee-track flex whitespace-nowrap py-3 font-display font-bold tracking-[0.1em] text-sm md:text-base text-white">
            {items.concat(items).map((t, i) => (
              <span key={i} className="flex items-center gap-8 px-6">{t}<span className="text-white/70">✦</span></span>
            ))}
          </div>
        </div>
      );
    };

    /* ---------- PostRegistration view ---------- */
    const CALENDAR_URL = 'https://www.addevent.com/event/kz7qhnqbsrv3';

    const PostRegistration = () => {
      useEffect(() => {
        requestAnimationFrame(() => {
          window.scrollTo(0, 0);
          document.documentElement.scrollTop = 0;
          if (document.body) document.body.scrollTop = 0;
        });
        const redirect = setTimeout(() => {
          window.location.href = 'https://chat.whatsapp.com/EBWBXsBCiyhDis15FQqhur?mode=gi_t';
        }, 4000);
        return () => clearTimeout(redirect);
      }, []);
      return (
      <div className="animate-fade-up">
        <Marquee />

        {/* Intro — confirmación */}
        <section className="relative pt-14 md:pt-24 pb-6 md:pb-10 px-4 sm:px-6">
          <div className="max-w-[760px] mx-auto text-center">
            <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full gradient-border text-[11px] tracking-[0.2em] uppercase font-semibold">
              <span className="text-emerald-300">✓</span>
              <span className="text-white/85">Plaza confirmada</span>
            </div>
            <h1 className="mt-6 font-display font-black text-[clamp(2.2rem,6vw,4.2rem)] leading-[1.02] tracking-[-0.02em]">
              ¡Ya estás dentro! <span className="inline-block animate-float">🎉</span>
            </h1>
            <p className="mt-5 text-white/75 text-lg max-w-xl mx-auto leading-relaxed">
              Tu lugar en la masterclass del 7 de mayo está reservado.
            </p>
          </div>
        </section>

        {/* Main — WhatsApp card */}
        <section className="relative px-4 sm:px-6 pb-10 md:pb-14">
          <div className="max-w-[1080px] mx-auto">
            <div className="relative gradient-border-strong rounded-[2rem] overflow-hidden p-6 md:p-12 text-center whatsapp-pulse">
              <div className="relative max-w-[640px] mx-auto">
                <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full gradient-border text-[11px] tracking-[0.2em] uppercase font-semibold text-white/80">
                  <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse-dot"></span>
                  Grupo privado
                </div>
                <h2 className="mt-4 font-display font-bold text-[clamp(1.7rem,4vw,2.6rem)] leading-[1.1] tracking-[-0.02em]">
                  Únete al <span className="text-brand-gradient">grupo de WhatsApp</span>
                </h2>
                <p className="mt-4 text-white/70 text-[15.5px] leading-relaxed max-w-md mx-auto">
                  Entrá al grupo para no perderte ningún detalle del evento en vivo.
                </p>
                <ul className="mt-7 space-y-3.5 text-left max-w-md mx-auto">
                  {[
                    { Icon: IconCalendar, t: 'Recordatorios puntuales', d: 'y el link directo al evento en vivo' },
                    { Icon: IconFileText, t: 'Contenidos y tips', d: 'para que llegues listo a la masterclass' },
                    { Icon: IconUsers,    t: 'Networking',            d: 'con otros que están construyendo su agencia de IA' },
                  ].map((it, i) => (
                    <li key={i} className="flex gap-3 items-start">
                      <span className="shrink-0 mt-0.5 w-9 h-9 rounded-xl flex items-center justify-center bg-emerald-500/15 border border-emerald-400/25">
                        <it.Icon className="w-4 h-4 text-emerald-300" strokeWidth={2} />
                      </span>
                      <div className="text-[14.5px] leading-relaxed pt-1">
                        <span className="font-semibold text-white">{it.t}</span>
                        <span className="text-white/65"> — {it.d}</span>
                      </div>
                    </li>
                  ))}
                </ul>
                <a href="https://chat.whatsapp.com/EBWBXsBCiyhDis15FQqhur?mode=gi_t" target="_blank" rel="noopener noreferrer"
                   className="cta-whatsapp mt-8 rounded-full px-7 py-3.5 font-semibold text-white text-sm sm:text-base tracking-wide inline-flex items-center justify-center gap-2.5 w-full max-w-xs sm:w-auto">
                  <svg viewBox="0 0 24 24" className="w-5 h-5" fill="currentColor" aria-hidden="true">
                    <path d="M19.05 4.91A9.82 9.82 0 0 0 12.04 2c-5.46 0-9.91 4.45-9.91 9.91 0 1.75.46 3.45 1.32 4.95L2.05 22l5.25-1.38a9.9 9.9 0 0 0 4.74 1.21h.01c5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.91-7.01zm-7.01 15.24h-.01a8.23 8.23 0 0 1-4.19-1.15l-.3-.18-3.12.82.83-3.04-.2-.31a8.2 8.2 0 0 1-1.26-4.38c0-4.54 3.7-8.24 8.25-8.24 2.2 0 4.27.86 5.83 2.42a8.18 8.18 0 0 1 2.41 5.83c-.02 4.55-3.71 8.23-8.24 8.23zm4.52-6.16c-.25-.12-1.47-.72-1.69-.81-.23-.08-.39-.12-.56.12-.17.25-.64.81-.78.97-.14.17-.29.19-.54.06-.25-.12-1.05-.39-1.99-1.23-.74-.66-1.23-1.47-1.38-1.72-.14-.25-.02-.38.11-.51.11-.11.25-.29.37-.43.12-.14.17-.25.25-.41.08-.17.04-.31-.02-.43-.06-.12-.56-1.34-.76-1.84-.2-.48-.4-.42-.56-.43h-.48c-.17 0-.43.06-.66.31-.23.25-.87.85-.87 2.07 0 1.22.89 2.4 1.02 2.56.12.17 1.76 2.69 4.27 3.77.6.26 1.06.41 1.42.52.6.19 1.14.16 1.57.1.48-.07 1.47-.6 1.68-1.18.21-.58.21-1.07.14-1.18-.06-.1-.22-.16-.47-.28z"/>
                  </svg>
                  UNIRME AL WHATSAPP
                </a>
              </div>
            </div>
          </div>
        </section>

        {/* Bottom — 2 reminder cards */}
        <section className="relative px-4 sm:px-6 pb-16 md:pb-20">
          <div className="max-w-[1080px] mx-auto">
            <h3 className="text-center font-display font-bold text-[clamp(1.3rem,2.8vw,1.8rem)] tracking-[-0.01em] text-white/90">
              Además, no te olvides de:
            </h3>
            <div className="mt-8 grid sm:grid-cols-2 gap-4 md:gap-5">
              <div className="reminder-card gradient-border rounded-2xl p-6">
                <div className="w-11 h-11 rounded-xl brand-gradient flex items-center justify-center shadow-[0_10px_30px_-8px_rgba(242,57,255,0.5)]">
                  <IconCalendar className="w-5 h-5 text-white" strokeWidth={2} />
                </div>
                <h4 className="mt-4 font-display font-bold text-[17px] leading-snug">
                  Reservá la fecha en tu calendario
                </h4>
                <p className="mt-2 text-white/65 text-[14px] leading-relaxed">
                  El evento en vivo es el <span className="text-white font-medium">jueves 7 de mayo a las 19:00h (hora España)</span>. Bloqueá tu agenda para no perdértelo.
                </p>
                <a href={CALENDAR_URL} target="_blank" rel="noopener noreferrer"
                   className="cta-primary mt-5 inline-flex items-center gap-2 rounded-full px-5 py-2.5 font-semibold text-white text-[13px] tracking-wide">
                  <IconCalendar className="w-4 h-4" /> Añadir al calendario
                </a>
              </div>
              <div className="reminder-card reminder-card--pink gradient-border rounded-2xl p-6">
                <div className="w-11 h-11 rounded-xl bg-nexum-pink/15 border border-nexum-pink/30 flex items-center justify-center shadow-[0_10px_30px_-8px_rgba(242,57,255,0.4)]">
                  <IconMail className="w-5 h-5 text-nexum-pink" strokeWidth={2} />
                </div>
                <h4 className="mt-4 font-display font-bold text-[17px] leading-snug">
                  Revisá la bandeja de entrada
                </h4>
                <p className="mt-2 text-white/65 text-[14px] leading-relaxed">
                  Te acabamos de enviar un email con todos los detalles del evento y tu <span className="text-white font-medium">Kit de Inicio para Agencias de IA</span> (790€) listo para descargar.
                </p>
              </div>
            </div>
          </div>
        </section>
      </div>
      );
    };

    /* ---------- Registration view ---------- */
    const Registration = ({ countdown, onOpenModal }) => (
      <>
        <Nav countdown={countdown} onOpenModal={onOpenModal} />
        <Hero countdown={countdown} onOpenModal={onOpenModal} />
        <PainBlock />
        <LearnCards />
        <ForYou />
        <About />
        <Bonus onOpenModal={onOpenModal} />
        <ClosingCTA onOpenModal={onOpenModal} />
      </>
    );

    /* ---------- Main App ---------- */
    function App() {
      const [view, setView] = useState('registration');
      const [submitting, setSubmitting] = useState(false);
      const [overlay, setOverlay] = useState(false);
      const [modalOpen, setModalOpen] = useState(false);
      const [countdown, setCountdown] = useState(computeCountdown(TARGET));

      useEffect(() => {
        const id = setInterval(() => setCountdown(computeCountdown(TARGET)), 1000);
        return () => clearInterval(id);
      }, []);

      useReveal();

      const openModal = useCallback(() => setModalOpen(true), []);
      const closeModal = useCallback(() => setModalOpen(false), []);

      const handleSubmit = useCallback((data) => {
        // Fire-and-forget a n8n. credentials:'omit' evita el preflight con
        // Allow-Credentials que rompía con sendBeacon. keepalive:true permite
        // que el POST sobreviva a la navegación / cierre de pestaña.
        const webhookUrl = 'https://n8n.nexumai.online/webhook/57459119-11c9-4608-bc70-85b9193a9b88';
        const payload = { email: data.email, nombre: data.name };
        fetch(webhookUrl, {
          method: 'POST',
          mode: 'cors',
          credentials: 'omit',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
          keepalive: true,
        }).catch(() => {});
        // Marker en DevTools para confirmar que el handler corrió (Network → POST al webhook)
        // eslint-disable-next-line no-console
        console.log('[webinar] webhook n8n →', payload);

        setSubmitting(true);
        setTimeout(() => {
          setSubmitting(false);
          setModalOpen(false);
          setOverlay(true);
          setTimeout(() => {
            // 1) Scroll a top ANTES de cambiar la view (el overlay todavía tapa → sin flash)
            window.scrollTo(0, 0);
            document.documentElement.scrollTop = 0;
            if (document.body) document.body.scrollTop = 0;
            // 2) Cambiar la view + quitar overlay
            setView('postRegistration');
            setOverlay(false);
          }, 2500);
        }, 900);
      }, []);

      // Lock body scroll durante el overlay (evita scroll accidental en mobile)
      useEffect(() => {
        if (overlay) {
          const prev = document.body.style.overflow;
          document.body.style.overflow = 'hidden';
          return () => { document.body.style.overflow = prev; };
        }
      }, [overlay]);

      return (
        <>
          {view === 'registration'
            ? <Registration countdown={countdown} onOpenModal={openModal} />
            : <PostRegistration />}
          <Footer />
          <Modal open={modalOpen} onClose={closeModal} onSubmit={handleSubmit} submitting={submitting} />
          {overlay && <ConfirmOverlay />}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
